<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Signal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        /* 기본 설정 */
        body { background-color: #000000; color: #d1d5db; font-family: 'Pretendard', sans-serif; }
        
        /* 중세풍 폰트 적용 클래스 */
        .medieval { font-family: 'UnifrakturMaguntia', serif; }
        .green-point { color: #22c55e; text-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
        
        /* 아코디언 박스 */
        details {
            background-color: #0a0a0a;
            border: 1px solid #1f2937;
            border-left: 4px solid #1f2937; /* 왼쪽 선 강조 */
            margin-bottom: 1.2rem;
            transition: all 0.4s ease;
        }
        details[open] {
            border-color: #22c55e;
            border-left: 4px solid #22c55e;
        }
        summary {
            padding: 1.25rem;
            list-style: none;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        summary::after {
            content: '▼';
            font-size: 0.7rem;
            color: #22c55e;
            transition: 0.3s;
        }
        details[open] summary::after {
            transform: rotate(180deg);
        }
        .content {
            padding: 0 1.25rem 1.5rem 1.25rem;
            border-top: 1px dashed #1f2937;
            padding-top: 1rem;
            line-height: 1.8;
        }
